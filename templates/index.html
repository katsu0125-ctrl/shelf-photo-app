<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>棚写真アップロード</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 24px 16px 48px;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 16px rgba(0,0,0,.1);
      padding: 28px 24px;
      width: 100%;
      max-width: 480px;
    }
    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #1a202c;
      margin-bottom: 4px;
    }
    .subtitle {
      font-size: 13px;
      color: #718096;
      margin-bottom: 24px;
    }
    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #4a5568;
      margin-bottom: 6px;
    }
    input[type="text"], input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #cbd5e0;
      border-radius: 10px;
      font-size: 16px;
      color: #1a202c;
      background: #f7fafc;
      outline: none;
      transition: border-color .2s;
      margin-bottom: 20px;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
      font-family: inherit;
    }
    input[type="date"] { display: block; }
    input[type="text"]:focus, input[type="date"]:focus {
      border-color: #4299e1;
      background: #fff;
    }
    .photo-area {
      border: 2px dashed #cbd5e0;
      border-radius: 12px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 24px;
      position: relative;
    }
    .photo-area:hover { border-color: #4299e1; background: #ebf8ff; }
    .photo-area input[type="file"] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }
    .photo-icon { font-size: 40px; margin-bottom: 8px; }
    .photo-label { font-size: 15px; color: #4a5568; font-weight: 600; }
    .photo-hint { font-size: 12px; color: #a0aec0; margin-top: 4px; }
    #preview-wrap { display: none; margin-bottom: 24px; text-align: center; }
    #preview-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
    #preview-grid img { width: 100%; height: 90px; object-fit: cover; border-radius: 8px; box-shadow: 0 1px 4px rgba(0,0,0,.15); }
    #preview-name { font-size: 12px; color: #718096; margin-top: 8px; }
    button[type="submit"] {
      width: 100%;
      padding: 15px;
      background: #3182ce;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s, transform .1s;
    }
    button[type="submit"]:hover { background: #2b6cb0; }
    button[type="submit"]:active { transform: scale(.98); }
    button[type="submit"]:disabled { background: #a0aec0; cursor: not-allowed; }
    #status {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      display: none;
    }
    #status.ok { background: #c6f6d5; color: #276749; }
    #status.err { background: #fed7d7; color: #9b2c2c; }
    .folder-link {
      display: block;
      margin-top: 20px;
      padding: 14px;
      text-align: center;
      background: #edf2f7;
      color: #2b6cb0;
      border: 1.5px solid #cbd5e0;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
    }
    .folder-link:active { background: #e2e8f0; }
    .loading { display: none; text-align: center; margin-top: 14px; color: #718096; font-size: 14px; }
    .spinner {
      display: inline-block;
      width: 20px; height: 20px;
      border: 3px solid #cbd5e0;
      border-top-color: #3182ce;
      border-radius: 50%;
      animation: spin .8s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="card">
  <h1>📸 棚写真アップロード</h1>
  <p class="subtitle">撮影した売り場の写真をアップロードしてください</p>

  <form id="upload-form" enctype="multipart/form-data">
    <label for="store_name">店舗名</label>
    <input type="text" id="store_name" name="store_name" placeholder="例: ヨドバシカメラ秋葉原店" required>

    <label for="uploader">アップロード者名</label>
    <input type="text" id="uploader" name="uploader" placeholder="例: 山田太郎" required>

    <label for="taken_date">撮影日</label>
    <input type="date" id="taken_date" name="taken_date">

    <label>写真（複数選択できます）</label>
    <div class="photo-area" id="photo-area">
      <input type="file" id="photo" name="photo" accept="image/*" multiple required>
      <div class="photo-icon">📷</div>
      <div class="photo-label">タップして写真を選択</div>
      <div class="photo-hint">複数まとめて選べます / JPG・PNG・HEIC対応</div>
    </div>

    <div id="preview-wrap">
      <div id="preview-grid"></div>
      <div id="preview-name"></div>
    </div>

    <button type="submit" id="submit-btn">アップロード</button>
  </form>

  <div class="loading" id="loading">
    <span class="spinner"></span>アップロード中...
  </div>
  <div id="status"></div>

  <a class="folder-link" href="https://drive.google.com/drive/folders/17LKO_dVxdNr01Wu6abmzRdF-dyB_dyof?usp=sharing" target="_blank" rel="noopener">
    🗂 アップロードした写真を確認する
  </a>
</div>

<script>
  // 今日の日付をデフォルト設定
  const dtInput = document.getElementById('taken_date');
  function setToday() {
    const n = new Date();
    n.setMinutes(n.getMinutes() - n.getTimezoneOffset());
    dtInput.value = n.toISOString().slice(0, 10);
  }
  setToday();

  // 写真選択時にプレビュー表示（複数対応）
  document.getElementById('photo').addEventListener('change', function () {
    const files = Array.from(this.files);
    if (!files.length) return;
    const grid = document.getElementById('preview-grid');
    grid.innerHTML = '';
    files.forEach(file => {
      const reader = new FileReader();
      reader.onload = e => {
        const img = document.createElement('img');
        img.src = e.target.result;
        grid.appendChild(img);
      };
      reader.readAsDataURL(file);
    });
    document.getElementById('preview-name').textContent = files.length + '枚 選択中';
    document.getElementById('preview-wrap').style.display = 'block';
    document.getElementById('photo-area').style.display = 'none';
  });

  // フォーム送信
  document.getElementById('upload-form').addEventListener('submit', async function (e) {
    e.preventDefault();
    const btn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const status = document.getElementById('status');

    btn.disabled = true;
    loading.style.display = 'block';
    status.style.display = 'none';

    try {
      const formData = new FormData(this);
      const res = await fetch('/upload', { method: 'POST', body: formData });
      const data = await res.json();

      status.style.display = 'block';
      if (data.ok) {
        status.className = 'ok';
        status.textContent = '✅ ' + data.message;
        // 店舗名・アップロード者は残し、写真だけリセット
        document.getElementById('photo').value = '';
        document.getElementById('preview-grid').innerHTML = '';
        document.getElementById('preview-wrap').style.display = 'none';
        document.getElementById('photo-area').style.display = 'block';
        setToday();
      } else {
        status.className = 'err';
        status.textContent = '❌ ' + data.error;
      }
    } catch (err) {
      status.style.display = 'block';
      status.className = 'err';
      status.textContent = '❌ 通信エラーが発生しました';
    } finally {
      btn.disabled = false;
      loading.style.display = 'none';
    }
  });
</script>
</body>
</html>
