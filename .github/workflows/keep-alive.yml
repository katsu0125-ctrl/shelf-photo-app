name: keep-alive

# Render無料プランのスリープを防ぐため、定期的にアプリへアクセスする
on:
  schedule:
    - cron: '*/10 * * * *'   # 10分ごと
  workflow_dispatch:          # 手動実行も可能

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: アプリにアクセスしてスリープを防ぐ
        run: |
          curl -s -o /dev/null -w "HTTP %{http_code}\n" --max-time 90 \
            https://shelf-photo-app.onrender.com/
